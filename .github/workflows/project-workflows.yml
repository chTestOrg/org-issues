name: Project – PR Automation

on:
  workflow_call:

jobs:
  project-workflows:
    runs-on: ubuntu-latest

    steps:
      - name: Who is the sender?
        run: |
          echo "Sender Login: ${{ github.event.sender.login }}"
          echo "Sender Type: ${{ github.event.sender.type }}"
          echo "Actor: ${{ github.actor }}"
          echo "Action: ${{ github.event.action }}"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: chTestORG

      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          repository: chTestORG/org-issues
          path: config-repo
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Execute Workflow Handler
        uses: actions/github-script@v7
        env:
          script-name: "workflow-handler"
          # Передаємо стандартний токен для "тихих" оновлень
          GITHUB_TOKEN: ${{ github.token }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const scriptName = "${{ env.script-name }}";
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/config-repo/projectV2/${scriptName}.mjs`;       
            try {
              const { default: run } = await import(scriptPath);
              await run({ github, context, core, githubToken: process.env.GITHUB_TOKEN });
            } catch (err) {
              core.setFailed(`Failed to execute ${scriptName}: ${err.message}`);
            }