name: Release Board Sync

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. R2278)"
        required: true
        type: string

jobs:
  release-sync:
    name: Sync Release Tasks
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: chTestORG

      - name: Step 1 — Sync Completed ↔ Tested
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { default: run } = await import(
              `./projectV2/syncCompletedTested.mjs`
            );
            await run({ github, context, core });

      - name: Step 2–6 — Release Completed Items (${{ inputs.release_version }})
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { default: run } = await import(
              `./projectV2/releaseCompletedIssues.mjs`
            );
            await run({ github, context, core, releaseVersion: process.env.RELEASE_VERSION });